services:
  thabat-kafka:
    image: bitnami/kafka:3.9
    container_name: thabat-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft (no ZooKeeper)
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@thabat-kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Dual listeners: Docker network + Windows host (localhost:9092)
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://thabat-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - thabat-kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - thabat-kafka-net

  thabat-kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: thabat-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: thabat-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: thabat-kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      thabat-kafka:
        condition: service_healthy
    networks:
      - thabat-kafka-net

volumes:
  thabat-kafka-data:
    name: thabat-kafka-data

networks:
  thabat-kafka-net:
    name: thabat-kafka-net
