spring:
  datasource:
    url: jdbc:h2:mem:thabat_notification;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    listener:
      auto-startup: false

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long!!

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
