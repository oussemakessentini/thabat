spring:
  application:
    name: identity-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: "optional:file:${ENV_FILE:./.env}[.properties]"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/thabat_identity_db}
    username: ${DB_USERNAME:thabat}
    password: ${DB_PASSWORD:thabat}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always